<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Louis Liu — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
/* ============================================================
   Louis Liu — Portfolio  |  Design System 1.0
   Dark theme · Camboge (#FFAE32) · Playfair Display + Inter
============================================================ */

:root {
  /* Backgrounds */
  --bg: #0F1113;
  --bg-card: #1A1D20;
  --bg-surface: #2E3338;
  --bg-surface-hover: #374145;

  /* Text */
  --ink: #FFFFFF;
  --ink-soft: #A7ADB3;
  --ink-muted: rgba(167, 173, 179, 0.75);
  --ink-line: rgba(255, 255, 255, 0.07);
  --ink-line-strong: rgba(255, 255, 255, 0.13);

  /* Accent — Camboge */
  --accent: #FFAE32;
  --accent-dark: #F08A00;
  --accent-soft: rgba(255, 174, 50, 0.13);
  --accent-softer: rgba(255, 174, 50, 0.06);

  /* Legacy aliases kept for JSX compatibility */
  --pink: #232728;
  --pink-stroke: rgba(255, 255, 255, 0.13);
  --orange-text: #FFAE32;
  --green: #6BA368;
  --slate: #475156;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--ink);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }

img { display: block; max-width: 100%; }

button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }

/* ── type ── */
.eyebrow {
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-soft); line-height: 1.5;
}
.h1 {
  font-family: "Playfair Display", Georgia, serif;
  font-size: clamp(40px, 6vw, 56px);
  font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.1; margin: 0;
}
.h2 {
  font-family: "Playfair Display", Georgia, serif;
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 600; letter-spacing: -0.015em;
  line-height: 1.2; margin: 0;
}
.h3 {
  font-family: "Playfair Display", Georgia, serif;
  font-size: 28px; font-weight: 600;
  letter-spacing: -0.01em; line-height: 1.2; margin: 0;
}
.h4 {
  font-family: "Inter", sans-serif;
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.01em; line-height: 1.3; margin: 0;
}
.lede {
  font-size: 18px; font-weight: 400;
  color: var(--ink-soft); line-height: 1.65;
  letter-spacing: 0; margin: 0;
}
.body {
  font-size: 16px; font-weight: 400;
  color: var(--ink-soft); line-height: 1.65;
  letter-spacing: 0; margin: 0;
}
.body-sm { font-size: 14px; color: var(--ink-soft); line-height: 1.55; }
.muted { color: var(--ink-soft); }

/* ── layout ── */
.page { max-width: 1200px; margin: 0 auto; width: 100%; }
.section { padding: 80px 24px; }
.section-narrow { padding: 80px 200px; }
@media (max-width: 980px) {
  .section, .section-narrow { padding: 64px 16px; }
}

/* ── nav ── */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(15, 17, 19, 0.75);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-bottom: 1px solid transparent;
  transition: background 240ms ease, border-color 240ms ease;
}
.nav.is-scrolled {
  background: rgba(15, 17, 19, 0.95);
  border-bottom-color: var(--ink-line-strong);
}
.nav-inner {
  max-width: 1200px; margin: 0 auto;
  height: 68px; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}
@media (max-width: 980px) { .nav-inner { padding: 0 16px; height: 60px; } }

.brand {
  display: inline-flex; align-items: center; gap: 10px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.brand-icon { display: flex; align-items: center; flex-shrink: 0; }
.brand-text {
  font-family: "Inter", sans-serif;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink); transition: color 200ms ease;
}
.brand:hover .brand-text { color: var(--accent); }
/* keep old selectors from breaking */
.brand-name { display: none; }
.brand-dot, .brand-name-soft { display: none; }

.nav-links { display: flex; gap: 2px; align-items: center; }
.nav-link {
  position: relative;
  font-family: "Inter", sans-serif;
  font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
  cursor: pointer; padding: 10px 13px;
  color: var(--ink-soft); background: transparent; border: 0;
  transition: color 200ms ease;
}
.nav-link::after {
  content: ""; position: absolute;
  left: 13px; right: 13px; bottom: 5px;
  height: 1.5px; background: var(--accent);
  transform: scaleX(0); transform-origin: left center;
  transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
}
.nav-link:hover { color: var(--ink); }
.nav-link.is-active { color: var(--ink); font-weight: 600; }
.nav-link.is-active::after { transform: scaleX(1); }

.nav-cta {
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 14px; padding: 9px 18px;
  border-radius: 6px;
  background: var(--accent); color: #0F1113;
  font-family: "Inter", sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  cursor: pointer; text-decoration: none;
  transition: background 200ms ease, transform 200ms ease;
}
.nav-cta:hover { background: var(--accent-dark); transform: translateY(-1px); }
.nav-cta-dot { display: none; }
@media (max-width: 640px) { .nav-cta { display: none; } }

.nav-back {
  font-family: "Inter", sans-serif;
  font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px 8px 10px; border-radius: 6px;
  color: var(--ink-soft); background: transparent;
  border: 1px solid var(--ink-line-strong);
  transition: gap 200ms ease, color 200ms ease, border-color 200ms ease;
}
.nav-back:hover { gap: 12px; color: var(--ink); border-color: var(--ink-soft); }
.nav-back .arrow { display: inline-block; transition: transform 200ms ease; }
.nav-back:hover .arrow { transform: translateX(-3px); }

/* ── minimal home ── */
.home-min { --gutter: 24px; }
@media (max-width: 980px) { .home-min { --gutter: 16px; } }

.hero-min {
  max-width: 1200px; margin: 0 auto;
  padding: 140px var(--gutter) 96px;
  display: flex; flex-direction: column; gap: 32px;
}
@media (max-width: 980px) { .hero-min { padding: 80px var(--gutter) 56px; gap: 24px; } }
.hero-min-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: "Inter", sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-soft);
}
.hero-min-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(255, 174, 50, 0.18);
  animation: heroDotPulse 2.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes heroDotPulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(255, 174, 50, 0.18); }
  50%       { box-shadow: 0 0 0 8px rgba(255, 174, 50, 0.06); }
}
.hero-min-title {
  margin: 0;
  font-family: "Playfair Display", Georgia, serif;
  font-size: clamp(48px, 8vw, 100px);
  font-weight: 700; letter-spacing: -0.03em;
  line-height: 1.0; color: var(--ink); max-width: 1100px;
}
.hero-min-title em {
  font-style: italic; font-weight: 600; color: var(--accent);
}
.hero-min-sub {
  margin: 0;
  font-size: clamp(16px, 1.4vw, 20px);
  font-weight: 400; line-height: 1.65; letter-spacing: 0;
  color: var(--ink-soft); max-width: 580px;
}
.hero-min-meta {
  margin-top: 8px; display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap;
  font-family: "Inter", sans-serif;
  font-size: 13px; color: var(--ink-soft); letter-spacing: 0.01em;
}
.hero-min-meta-strong { color: var(--accent); font-weight: 700; }
.hero-min-divider { width: 20px; height: 1px; background: var(--ink-line-strong); }

/* ── section labels ── */
.work-min, .walks-min {
  max-width: 1200px; margin: 0 auto; padding: 56px var(--gutter);
}
.work-min-head {
  display: flex; align-items: baseline; justify-content: space-between;
  border-bottom: 1px solid var(--ink-line-strong);
  padding-bottom: 16px; margin-bottom: 8px;
}
.section-label {
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft);
}
.section-count {
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--ink-soft); font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
}

/* ── work rows ── */
.work-list { list-style: none; margin: 0; padding: 0; }
.work-row {
  display: grid;
  grid-template-columns: 48px 1fr 88px 100px;
  align-items: center; gap: 28px;
  padding: 28px 12px;
  border-bottom: 1px solid var(--ink-line);
  position: relative; transition: padding 240ms ease, background 240ms ease;
}
.work-row.is-clickable { cursor: pointer; }
.work-row.is-clickable:hover {
  padding-left: 24px; padding-right: 24px;
  background: rgba(255,255,255,0.015);
}
.work-row.is-clickable::before {
  content: ""; position: absolute;
  left: 0; top: 0; bottom: 0; width: 0;
  background: var(--accent); transition: width 240ms ease;
}
.work-row.is-clickable:hover::before { width: 3px; }
.work-row.is-disabled { opacity: 0.38; }
.work-row-num {
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--ink-soft); font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}
.work-row-text { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.work-row-title {
  font-family: "Playfair Display", Georgia, serif;
  font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 600; letter-spacing: -0.01em;
  line-height: 1.2; color: var(--ink);
}
.work-row-q {
  font-size: 13px; font-weight: 400;
  color: var(--ink-soft); line-height: 1.6;
  letter-spacing: 0; max-width: 600px;
}
.work-row-thumb {
  width: 88px; height: 60px; border-radius: 8px;
  background-size: cover; background-position: center;
  background-color: var(--bg-surface);
  border: 1px solid var(--ink-line);
  transform: rotate(-2deg);
  transition: transform 240ms ease, box-shadow 240ms ease;
}
.work-row.is-clickable:hover .work-row-thumb {
  transform: rotate(0deg) scale(1.04);
  box-shadow: 0 12px 24px -12px rgba(0,0,0,0.5);
}
.work-row-cta {
  justify-self: end; display: inline-flex; align-items: center; gap: 6px;
  font-family: "Inter", sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-soft); white-space: nowrap;
}
.work-row-cta .arrow { transition: transform 200ms ease; }
.work-row.is-clickable:hover .work-row-cta { color: var(--accent); }
.work-row.is-clickable:hover .work-row-cta .arrow { transform: translateX(6px); }
.work-row-cta.coming-soon { color: var(--ink-soft); }
@media (max-width: 860px) {
  .work-row { grid-template-columns: 32px 1fr; gap: 14px; padding: 20px 4px; }
  .work-row-thumb, .work-row-cta { grid-column: 2; justify-self: start; }
  .work-row-thumb { width: 72px; height: 48px; }
}

/* ── walkthroughs ── */
.walks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
@media (max-width: 860px) { .walks-grid { grid-template-columns: 1fr; } }
.walk-card {
  border: 1px solid var(--ink-line);
  border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--bg-card); cursor: pointer;
  transition: transform 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
}
.walk-card:hover {
  transform: translateY(-3px);
  border-color: var(--ink-line-strong);
  box-shadow: 0 24px 48px -24px rgba(0,0,0,0.5);
}
.walk-card-img {
  height: 220px; background-size: cover;
  background-position: center; background-color: var(--bg-surface);
  border-bottom: 1px solid var(--ink-line);
}
.walk-card-text { padding: 24px 24px 28px; display: flex; flex-direction: column; gap: 10px; }
.walk-card-title {
  font-family: "Playfair Display", Georgia, serif;
  font-size: 20px; font-weight: 600;
  letter-spacing: -0.01em; line-height: 1.25; color: var(--ink);
}
.walk-card-q {
  margin: 0; font-size: 14px; font-weight: 400;
  color: var(--ink-soft); line-height: 1.6; letter-spacing: 0;
}
.walk-card-link {
  margin-top: 8px; display: inline-flex; align-items: center; gap: 6px;
  font-family: "Inter", sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase;
}
.walk-card-link .arrow { transition: transform 200ms ease; }
.walk-card:hover .walk-card-link .arrow { transform: translateX(4px); }

/* ── contact band ── */
.contact {
  padding: 80px 24px 96px;
  max-width: 1200px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  border-top: 1px solid var(--ink-line);
}
.contact-email { text-align: center; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 22px; border-radius: 6px;
  font-family: "Inter", sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer;
  transition: transform 160ms ease, background 160ms ease, color 160ms ease;
}
.btn-primary { background: var(--accent); color: #0F1113; border: none; }
.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn-ghost { border: 1px solid var(--ink-line-strong); color: var(--ink); background: transparent; }
.btn-ghost:hover { border-color: var(--ink-soft); background: rgba(255,255,255,0.04); }

/* ── footer ── */
.footer {
  border-top: 1px solid var(--ink-line);
  padding: 40px 24px; text-align: center;
  font-family: "Inter", sans-serif;
  font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em;
}

/* ── about ── */
.about-min-hero { padding-bottom: 56px; }
.about-min-meta {
  margin-top: 8px; display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0;
  border-top: 1px solid var(--ink-line-strong); border-bottom: 1px solid var(--ink-line-strong);
}
@media (max-width: 860px) { .about-min-meta { grid-template-columns: 1fr 1fr; } }
.about-min-fact {
  padding: 20px 24px 22px; display: flex; flex-direction: column; gap: 6px;
  border-right: 1px solid var(--ink-line);
}
.about-min-fact:first-child { padding-left: 0; }
.about-min-fact:last-child { border-right: 0; padding-right: 0; }
@media (max-width: 860px) {
  .about-min-fact { padding: 16px 18px; }
  .about-min-fact:nth-child(odd) { padding-left: 0; }
  .about-min-fact:nth-child(even) { padding-right: 0; border-right: 0; }
  .about-min-fact:nth-child(1), .about-min-fact:nth-child(2) { border-bottom: 1px solid var(--ink-line); }
}
.about-min-fact-k {
  font-family: "Inter", sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft);
}
.about-min-fact-v { font-size: 16px; font-weight: 500; letter-spacing: 0; color: var(--ink); }
.about-min-links { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
.about-min-link {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-radius: 6px;
  border: 1px solid var(--ink-line-strong);
  font-family: "Inter", sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
  color: var(--ink); background: transparent;
  transition: border-color 200ms ease, transform 200ms ease, color 200ms ease;
}
.about-min-link svg { fill: currentColor; }
.about-min-link .arrow { transition: transform 200ms ease; color: var(--ink-soft); }
.about-min-link:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.about-min-link:hover .arrow { transform: translate(2px,-2px); color: var(--accent); }

.about-min-portrait-section {
  max-width: 1200px; margin: 0 auto; padding: 0 var(--gutter) 24px;
}
.about-min-portrait {
  width: 100%; aspect-ratio: 16/9; border-radius: 16px;
  background-size: cover; background-position: center 42%;
  background-color: var(--bg-surface); border: 1px solid var(--ink-line);
}
@media (max-width: 860px) { .about-min-portrait { aspect-ratio: 4/5; } }

.about-min-intro { display: flex; flex-direction: column; gap: 12px; margin: 24px 0 32px; max-width: 720px; }
.about-min-h2 {
  margin: 0;
  font-family: "Playfair Display", Georgia, serif;
  font-size: clamp(28px, 4vw, 48px); font-weight: 600;
  letter-spacing: -0.02em; line-height: 1.1; color: var(--ink);
}
.about-min-p { margin: 0; font-size: 16px; font-weight: 400; line-height: 1.65; color: var(--ink-soft); max-width: 600px; }
.about-min-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media (max-width: 860px) { .about-min-grid-3 { grid-template-columns: 1fr; } }
.about-min-photo-square { aspect-ratio: 1/1; }

/* Travel mosaic */
.about-min-travel {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 260px 260px;
  gap: 12px;
}
.about-min-travel .about-min-photo {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
  background-color: var(--bg-surface);
  border: 1px solid var(--ink-line);
  display: block;
}
.about-min-travel .about-min-photo:nth-child(1) { grid-area: 1 / 1 / 2 / 2; }
.about-min-travel .about-min-photo:nth-child(2) { grid-area: 1 / 2 / 3 / 3; }
.about-min-travel .about-min-photo:nth-child(3) { grid-area: 1 / 3 / 2 / 4; }
.about-min-travel .about-min-photo:nth-child(4) { grid-area: 2 / 1 / 3 / 2; }
.about-min-travel .about-min-photo:nth-child(5) { grid-area: 2 / 3 / 3 / 4; }
@media (max-width: 860px) {
  .about-min-travel {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 200px 200px 200px;
  }
  .about-min-travel .about-min-photo:nth-child(1) { grid-area: 1 / 1 / 2 / 2; }
  .about-min-travel .about-min-photo:nth-child(2) { grid-area: 1 / 2 / 3 / 3; }
  .about-min-travel .about-min-photo:nth-child(3) { grid-area: 2 / 1 / 3 / 2; }
  .about-min-travel .about-min-photo:nth-child(4) { grid-area: 3 / 1 / 4 / 2; }
  .about-min-travel .about-min-photo:nth-child(5) { grid-area: 3 / 2 / 4 / 3; }
}
.about-min-photo {
  border-radius: 10px; background-size: cover; background-position: center;
  background-color: var(--bg-surface); border: 1px solid var(--ink-line);
  transition: transform 320ms ease, box-shadow 320ms ease;
}
.about-min-photo:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 36px -20px rgba(0, 0, 0, 0.2);
}

/* ----------------- case study ----------------- */
.case-hero {
  padding: 120px 240px 64px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 18px;
  align-items: center;
  max-width: 1280px;
  margin: 0 auto;
}
@media (max-width: 980px) {
  .case-hero {
    padding: 64px 28px 32px;
  }
}
.case-hero .timeline {
  font-size: 18px;
  color: var(--ink-soft);
  letter-spacing: -0.005em;
}
.case-hero .author {
  font-size: 18px;
  color: var(--ink-soft);
  margin-top: 6px;
}

.case-image {
  padding: 32px 64px;
  max-width: 1280px;
  margin: 0 auto;
}
@media (max-width: 980px) {
  .case-image {
    padding: 24px 28px;
  }
}
.case-image .frame {
  width: 100%;
  aspect-ratio: 1152 / 533;
  border-radius: 16px;
  background-size: cover;
  background-position: center;
  background-color: var(--bg-surface);
  border: 1px solid var(--ink-line);
}
.case-image .frame.no-border {
  border: 0;
}

.context-row {
  padding: 32px 240px;
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}
@media (max-width: 980px) {
  .context-row {
    grid-template-columns: 1fr;

/* transitions */
.page-fade {
  animation: pageFade 320ms ease both;
}
@keyframes pageFade {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* scroll progress */
.scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 100;
  transition: width 80ms linear;
  pointer-events: none;
}

/* divider */
.divider {
  height: 1px;
  background: var(--ink-line);
  margin: 0;
}

/* focus indicators */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
  border-radius: 4px;
}

/* skip link */
.skip-link {
  position: absolute;
  top: -100%;
  left: 16px;
  z-index: 9999;
  background: var(--accent);
  color: #0F1113;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 0 0 8px 8px;
  text-decoration: none;
  transition: top 200ms;
}
.skip-link:focus { top: 0; }

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .page-fade { animation: none; opacity: 1; }
}

      /* ============================================================
         APP — routing + scroll progress
      ============================================================ */

      function parseHash() {
        const h = (window.location.hash || "#/").replace(/^#/, "");
        const [, name = "home"] = h.split("/");
        const valid = ["home", "about", "crm", "signals"];
        return { name: valid.includes(name) ? name : "home" };
      }

      function ScrollProgress() {
        const [w, setW] = useState(0);
        useEffect(() => {
          const onScroll = () => {
            const max = document.documentElement.scrollHeight - window.innerHeight;
            const pct = max > 0 ? (window.scrollY / max) * 100 : 0;
            setW(pct);
          };
          onScroll();
          window.addEventListener("scroll", onScroll, { passive: true });
          return () => window.removeEventListener("scroll", onScroll);
        }, []);
        return <div className="scroll-progress" style={{ width: `${w}%` }} aria-hidden="true" role="presentation" />;
      }

      function App() {
        const [route, setRoute] = useState(parseHash());
        useEffect(() => {
          const onHash = () => setRoute(parseHash());
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        const navigate = (next) => {
          window.location.hash = "#/" + next.name;
          window.scrollTo({ top: 0, behavior: "instant" });
        };

        useEffect(() => {
          window.scrollTo({ top: 0, behavior: "instant" });
          const titles = {
            home: "Louis Liu — Portfolio",
            about: "About — Louis Liu",
            crm: "CRM Object Permissions — Louis Liu",
            signals: "Signals Expansion — Louis Liu",
          };
          document.title = titles[route.name] || "Louis Liu — Portfolio";
        }, [route.name]);

        let page = null;
        if (route.name === "home")    page = <Home navigate={navigate} key="home" />;
        else if (route.name === "about")   page = <About navigate={navigate} key="about" />;
        else if (route.name === "crm")     page = <CRMCase navigate={navigate} key="crm" />;
        else if (route.name === "signals") page = <SignalsCase navigate={navigate} key="signals" />;

        return (
          <>
            <ScrollProgress />
            <Nav route={route} navigate={navigate} />
            {page}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
